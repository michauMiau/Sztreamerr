name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools/latest/bin
        cd /tmp
        wget https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
        unzip -q commandlinetools-linux-*.zip
        mv $PWD/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
        rmdir $PWD/cmdline-tools 2>/dev/null || true
    
    - name: Accept Android licenses
      uses: SimonMarquis/android-accept-licenses@v1

    - name: Accept android licenses again
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        yes | $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-28"
        yes | $ANDROID_HOME/tools/bin/sdkmanager "build-tools;27.0.3"

    - name: Install SDK packages
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
          "platforms;android-34" "build-tools;37.0.0"
    
    - name: Install Buildozer
      run: |
        pip install buildozer cython kivy[full]
    
    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sztreamerr-apk
        path: bin/*.apk
        if-no-files-found: error
