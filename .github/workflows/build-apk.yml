name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ACCEPT_LICENSES: "true"
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools/latest/bin
        cd /tmp
        wget https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
        unzip -q commandlinetools-linux-*.zip
        mv $PWD/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
        rmdir $PWD/cmdline-tools 2>/dev/null || true
    
    - name: Accept Android licenses
      uses: SimonMarquis/android-accept-licenses@v1

    - name: Accept build tools licenses
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        yes | $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-28" || true
        yes | $ANDROID_HOME/tools/bin/sdkmanager "build-tools;37.0.0" || true

    - name: Install SDK packages
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
          "platforms;android-34" "build-tools;37.0.0"
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Buildozer
      run: |
        sudo apt-get update && sudo apt-get install -y python3-pip build-essential git zip unzip wget curl python3-dev libtool autoconf automake pkg-config libltdl-dev
        pip install --user cython  # must be first — jnius/pyjnius need it to compile
        sleep 5  # wait for cython installation to complete
        pip install --user buildozer kivy pillow pyjnius requests aiohttp
        export PATH="$HOME/.local/bin:$PATH"
        which buildozer || echo "WARNING: buildozer not found in PATH"
    
    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        yes | buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sztreamerr-apk
        path: bin/*.apk
        if-no-files-found: error
